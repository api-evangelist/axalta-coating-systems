description: >-
  Axalta Coating Systems is a global supplier of liquid and powder coatings for
  transportation and industrial end-markets, operating through Performance Coatings
  (refinish and industrial) and Mobility Coatings (light vehicle and commercial vehicle)
  segments. Brands include Cromax, Spies Hecker, Standox, Imron, and Voltatex. In July
  2024 Axalta acquired The CoverFlexx Group from Transtar Holding for $285 million
  to expand its economy-tier aftermarket coverage in North America. In November 2025
  Axalta announced a $17 billion all-stock merger of equals with AkzoNobel that is
  expected to close in late 2026 or early 2027, forming a coatings company with
  dual headquarters in Amsterdam and Philadelphia.
